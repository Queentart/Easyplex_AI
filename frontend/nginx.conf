# nginx for the deployed Flutter Web + FastAPI stack.
#  "/"     -> Flutter Web static files (SPA fallback to index.html)
#  "/api/" -> reverse-proxied to the api container (same origin => no CORS)
#
# Same-origin is the whole point: the browser loads the app and hits /api/v1/*
# on the *same* host, so a single tunnel URL serves UI + backend together.

server {
    listen 80;
    server_name _;

    # Allow reasonably large uploads (assignments, attachments).
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA: serve the file if it exists, else fall back to index.html
    # so client-side routes (go_router) resolve on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend reverse proxy. proxy_pass without a URI path preserves the full
    # request URI, so /api/v1/... reaches FastAPI unchanged (router prefix /api/v1).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade headers (chat / realtime, if used).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
